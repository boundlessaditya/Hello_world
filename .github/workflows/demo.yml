name: python_testing

on:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4
      
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: execute py script
        run: python main.py

      - name: confirmation
        run: echo "Successful!!"
